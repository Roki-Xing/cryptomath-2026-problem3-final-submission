name: submission-gates

on:
  pull_request:
  push:
    branches:
      - main
      - "hardening/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cxx: g++
          - compiler: clang
            cxx: clang++
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Boost headers
        run: |
          mkdir -p /tmp/boost-deb /tmp/boost-headers
          cd /tmp/boost-deb
          apt-get download libboost1.83-dev
          dpkg-deb -x libboost1.83-dev_*.deb /tmp/boost-headers
          echo "CPLUS_INCLUDE_PATH=/tmp/boost-headers/usr/include" >> "$GITHUB_ENV"
      - name: Build and test (${{ matrix.compiler }})
        env:
          CXX: ${{ matrix.cxx }}
        run: |
          make clean
          make -j2
          make test
      - name: Rebuild frozen submission
        run: |
          python3 -X utf8 experiments/build_submit_from_sources.py --out /tmp/submit_rebuilt.txt
          cmp submit.txt /tmp/submit_rebuilt.txt
      - name: Run release gate
        run: |
          ./score --dedup uv --positive-only submit.txt | tee /tmp/score.log
          grep -Fx "valid_count=138338" /tmp/score.log
          grep -Fx "total_score=105843.622442471292742994" /tmp/score.log
          python3 -X utf8 experiments/check_submission.py --submit submit.txt

  stage-a-toolchain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run sanitizer and compiler consistency gates
        run: |
          python3 -X utf8 bench/way1/run_stage_toolchain.py \
            --suite all \
            --threads 8 \
            --out-dir bench/way1/stage_toolchain
      - name: Upload Stage-A toolchain evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-a-toolchain-${{ github.run_id }}-${{ github.run_attempt }}
          path: bench/way1/stage_toolchain
          if-no-files-found: error
